# ─────────────────────────────────────────────────────────────────────────────
#  SmartEnergy Cyber-Resilience Analyzer — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
#  Profiles:
#    demo            — one-shot: emulator -> analyzer -> UI (batch CSV)
#    live_direct     — closed-loop: emulator -> events.jsonl -> analyzer -> actions.jsonl -> emulator + dashboard
#    live_normalized — closed-loop: emulator -> raw logs -> normalizer -> normalized.jsonl -> analyzer -> actions.jsonl -> emulator + dashboard
#
#  Quick start:
#    docker compose --profile live_direct up --build
#    docker compose --profile live_normalized up --build
#    docker compose --profile demo up --build
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./data:/work/data
    - ./out:/work/out
    - ./config:/work/config
    - ./logs:/work/logs
  env_file: []

x-pg-env: &pg-env
  PGHOST: postgres
  PGPORT: "5432"
  PGUSER: smartenergy
  PGPASSWORD: smartenergy
  PGDATABASE: smartenergy

services:
  # ── 0. Init — clear runtime data from previous runs ──────────────────────
  init-live:
    <<: *common
    container_name: smartenergy-init-live
    entrypoint: ["sh", "-c"]
    command:
      - >-
        rm -rf data/live/* out/* logs/live/*
        && mkdir -p data/live out logs/live
        && echo 'Runtime data cleared.'
    restart: "no"
    profiles: ["live_direct", "live_normalized"]

  # ── 1. Emulator — batch CSV (demo profile) ──────────────────────────────
  emulator:
    <<: *common
    container_name: smartenergy-emulator
    command: >-
      python -m src.emulator
        --seed 42
        --out data/events.csv
        --log-level INFO
    profiles: ["generate", "demo"]

  # ── 2. Normalizer — batch: raw logs -> events.csv ──────────────────────
  normalizer:
    <<: *common
    container_name: smartenergy-normalizer
    command: >-
      python -m src.normalizer
        --inputs "logs/*.log"
        --mapping config/mapping.yaml
        --out data/events.csv
        --quarantine out/quarantine.csv
        --log-level INFO
    profiles: ["normalize"]

  # ── 3. Analyzer — batch: events.csv -> results ─────────────────────────
  analyzer:
    <<: *common
    container_name: smartenergy-analyzer
    command: >-
      python -m src.analyzer
        --input data/events.csv
        --out-dir out
        --policies all
        --horizon-days 1
        --log-level INFO
    depends_on:
      emulator:
        condition: service_completed_successfully
        required: false
    profiles: ["analyze", "demo"]

  # ── 4. UI — batch dashboard ────────────────────────────────────────────
  ui:
    <<: *common
    container_name: smartenergy-ui
    command: >-
      streamlit run src/dashboard/app.py
        --server.headless true
        --server.port 8501
        --server.address 0.0.0.0
        --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    depends_on:
      analyzer:
        condition: service_completed_successfully
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["ui", "demo"]

  # ═══════════════════════════════════════════════════════════════════════════
  #  INFRASTRUCTURE: Postgres + network-sim + db-writer
  #  Shared across live_direct and live_normalized profiles
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: smartenergy-postgres
    environment:
      POSTGRES_USER: smartenergy
      POSTGRES_PASSWORD: smartenergy
      POSTGRES_DB: smartenergy
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartenergy"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    profiles: ["live_direct", "live_normalized"]

  db-writer:
    build:
      context: .
      dockerfile: services/db_writer/Dockerfile
    container_name: smartenergy-db-writer
    environment:
      <<: *pg-env
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SEC: "60"
      WRITE_INTERVAL_SEC: "5"
      EVENTS_JSONL: /work/data/live/events.jsonl
      ACTIONS_PATH: /work/data/live/actions.jsonl
      APPLIED_PATH: /work/data/live/actions_applied.jsonl
    volumes:
      - ./data:/work/data
      - ./out:/work/out
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      init-live:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles: ["live_direct", "live_normalized"]

  network-sim:
    build:
      context: .
      dockerfile: services/network_sim/Dockerfile
    container_name: smartenergy-network-sim
    environment:
      PORT: "8090"
      EVENTS_JSONL: /work/data/live/events.jsonl
    volumes:
      - ./data:/work/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      init-live:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles: ["live_direct", "live_normalized"]

  # ═══════════════════════════════════════════════════════════════════════════
  #  MODE A: live_direct
  #    Emulator -> events.jsonl -> Analyzer (direct, skips normalizer)
  #    Closed-loop: Analyzer -> actions.jsonl -> Emulator
  # ═══════════════════════════════════════════════════════════════════════════

  emulator-live-direct:
    <<: *common
    container_name: smartenergy-emulator-live-direct
    environment:
      NETWORK_SIM_URL: "http://network-sim:8090"
    command: >-
      python -m src.emulator
        --live
        --live-interval-ms 250
        --attack-every-sec 10
        --background-events-per-tick 20
        --max-file-mb 50
        --out data/live/events.jsonl
        --raw-log-dir logs/live
        --csv-out data/live/events.csv
        --profile demo_high_rate
        --seed 42
        --actions-path data/live/actions.jsonl
        --applied-path data/live/actions_applied.jsonl
        --log-level INFO
    depends_on:
      init-live:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      network-sim:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["live_direct"]

  analyzer-live-direct:
    <<: *common
    container_name: smartenergy-analyzer-live-direct
    environment:
      NETWORK_SIM_URL: "http://network-sim:8090"
    command: >-
      python -m src.analyzer
        --input data/live/events.jsonl
        --watch
        --poll-interval-ms 1000
        --rolling-window-min 5
        --out-dir out
        --policies all
        --actions-path data/live/actions.jsonl
        --applied-path data/live/actions_applied.jsonl
        --log-level INFO
    depends_on:
      emulator-live-direct:
        condition: service_started
    restart: unless-stopped
    profiles: ["live_direct"]

  ui-live-direct:
    <<: *common
    container_name: smartenergy-ui-live-direct
    environment:
      - SMARTENERGY_LIVE_MODE=1
    command: >-
      streamlit run src/dashboard/app.py
        --server.headless true
        --server.port 8501
        --server.address 0.0.0.0
        --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    depends_on:
      analyzer-live-direct:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["live_direct"]

  # ═══════════════════════════════════════════════════════════════════════════
  #  MODE B: live_normalized
  #    Emulator -> raw logs -> Normalizer -> normalized.jsonl -> Analyzer
  #    Closed-loop: Analyzer -> actions.jsonl -> Emulator
  # ═══════════════════════════════════════════════════════════════════════════

  emulator-live-normalized:
    <<: *common
    container_name: smartenergy-emulator-live-normalized
    environment:
      NETWORK_SIM_URL: "http://network-sim:8090"
    command: >-
      python -m src.emulator
        --live
        --live-interval-ms 250
        --attack-every-sec 10
        --background-events-per-tick 20
        --max-file-mb 50
        --out data/live/events.jsonl
        --raw-log-dir logs/live
        --csv-out data/live/events.csv
        --profile demo_high_rate
        --seed 42
        --actions-path data/live/actions.jsonl
        --applied-path data/live/actions_applied.jsonl
        --log-level INFO
    depends_on:
      init-live:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      network-sim:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["live_normalized"]

  normalizer-live:
    <<: *common
    container_name: smartenergy-normalizer-live
    command: >-
      python -m src.normalizer
        --inputs "logs/live/*.log"
        --mapping config/mapping.yaml
        --out data/live/normalized.jsonl
        --quarantine out/quarantine_live.csv
        --follow
        --poll-interval-ms 500
        --log-level INFO
    depends_on:
      emulator-live-normalized:
        condition: service_started
    restart: unless-stopped
    profiles: ["live_normalized"]

  analyzer-live-normalized:
    <<: *common
    container_name: smartenergy-analyzer-live-normalized
    environment:
      NETWORK_SIM_URL: "http://network-sim:8090"
    command: >-
      python -m src.analyzer
        --input data/live/normalized.jsonl
        --watch
        --poll-interval-ms 1000
        --rolling-window-min 5
        --out-dir out
        --policies all
        --actions-path data/live/actions.jsonl
        --applied-path data/live/actions_applied.jsonl
        --log-level INFO
    depends_on:
      emulator-live-normalized:
        condition: service_started
      normalizer-live:
        condition: service_started
    restart: unless-stopped
    profiles: ["live_normalized"]

  ui-live-normalized:
    <<: *common
    container_name: smartenergy-ui-live-normalized
    environment:
      - SMARTENERGY_LIVE_MODE=1
    command: >-
      streamlit run src/dashboard/app.py
        --server.headless true
        --server.port 8501
        --server.address 0.0.0.0
        --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    depends_on:
      analyzer-live-normalized:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["live_normalized"]
