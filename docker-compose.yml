# ---------------------------------------------------------------------------
#  SmartEnergy Cyber-Resilience Analyzer -- Docker Compose
# ---------------------------------------------------------------------------
#  Profiles:
#    live    -- full closed-loop: emulator -> analyzer -> API + React frontend
#               includes: postgres, db-writer, network-sim
#    api     -- standalone API server only (requires pre-generated data in out/)
#
#  Quick start:
#    docker compose --profile live up --build
#    docker compose --profile api up --build
#
#  Endpoints:
#    http://localhost:5173              -- React dashboard (main UI)
#    http://localhost:8000/api/docs     -- Swagger UI (API documentation)
#    http://localhost:8000/api/incidents
#    http://localhost:8000/api/actions
#    http://localhost:8000/api/state
#    http://localhost:8000/api/metrics
# ---------------------------------------------------------------------------

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./data:/work/data
    - ./out:/work/out
    - ./config:/work/config
    - ./logs:/work/logs
  env_file: []

x-pg-env: &pg-env
  PGHOST: postgres
  PGPORT: "5432"
  PGUSER: smartenergy
  PGPASSWORD: smartenergy
  PGDATABASE: smartenergy

services:
  # ===========================================================================
  #  STANDALONE API (profile: api)
  #  Use when you have pre-generated data in out/ directory
  # ===========================================================================

  api:
    <<: *common
    container_name: smartenergy-api
    command: >-
      python -m src.api
        --host 0.0.0.0
        --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["api"]

  # ===========================================================================
  #  LIVE MODE (profile: live)
  #  Full closed-loop: Emulator -> Analyzer -> Actions -> Emulator
  #  Includes: Postgres, DB Writer, Network Simulator, API, React
  # ===========================================================================

  # -- Init: clear runtime data from previous runs ----------------------------
  init:
    <<: *common
    container_name: smartenergy-init
    entrypoint: ["sh", "-c"]
    command:
      - >-
        rm -rf data/live/* out/* logs/live/*
        && mkdir -p data/live out logs/live
        && echo 'Runtime data cleared.'
    restart: "no"
    profiles: ["live"]

  # -- Infrastructure: Postgres -----------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: smartenergy-postgres
    environment:
      POSTGRES_USER: smartenergy
      POSTGRES_PASSWORD: smartenergy
      POSTGRES_DB: smartenergy
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./backups:/backups
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartenergy"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    profiles: ["live"]

  # -- Infrastructure: DB Writer (executes backup/restore actions) ------------
  db-writer:
    build:
      context: .
      dockerfile: services/db_writer/Dockerfile
    container_name: smartenergy-db-writer
    environment:
      <<: *pg-env
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SEC: "60"
      WRITE_INTERVAL_SEC: "5"
      EVENTS_JSONL: /work/data/live/events.jsonl
      ACTIONS_PATH: /work/data/live/actions.jsonl
      APPLIED_PATH: /work/data/live/actions_applied.jsonl
    volumes:
      - ./data:/work/data
      - ./out:/work/out
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles: ["live"]

  # -- Infrastructure: Network Simulator --------------------------------------
  network-sim:
    build:
      context: .
      dockerfile: services/network_sim/Dockerfile
    container_name: smartenergy-network-sim
    environment:
      PORT: "8090"
      EVENTS_JSONL: /work/data/live/events.jsonl
      ACTIONS_PATH: /work/data/live/actions.jsonl
      APPLIED_PATH: /work/data/live/actions_applied.jsonl
    volumes:
      - ./data:/work/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/healthz')"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles: ["live"]

  # -- Emulator: generates events ---------------------------------------------
  emulator:
    <<: *common
    container_name: smartenergy-emulator
    environment:
      NETWORK_SIM_URL: "http://network-sim:8090"
    command: >-
      python -m src.emulator
        --live
        --live-interval-ms 250
        --attack-every-sec 10
        --background-events-per-tick 20
        --max-file-mb 50
        --out data/live/events.jsonl
        --raw-log-dir logs/live
        --csv-out data/live/events.csv
        --profile demo_high_rate
        --seed 42
        --actions-path data/live/actions.jsonl
        --applied-path data/live/actions_applied.jsonl
        --log-level INFO
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      network-sim:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["live"]

  # -- Analyzer: detects incidents, emits actions -----------------------------
  analyzer:
    <<: *common
    container_name: smartenergy-analyzer
    environment:
      NETWORK_SIM_URL: "http://network-sim:8090"
    command: >-
      python -m src.analyzer
        --input data/live/events.jsonl
        --watch
        --poll-interval-ms 1000
        --rolling-window-min 5
        --out-dir out
        --policies all
        --actions-path data/live/actions.jsonl
        --applied-path data/live/actions_applied.jsonl
        --log-level INFO
    depends_on:
      emulator:
        condition: service_started
    restart: unless-stopped
    profiles: ["live"]

  # -- API: REST backend for React frontend -----------------------------------
  api-live:
    <<: *common
    container_name: smartenergy-api-live
    environment:
      - SMARTENERGY_LIVE_MODE=1
    command: >-
      python -m src.api
        --host 0.0.0.0
        --port 8000
    ports:
      - "8000:8000"
    depends_on:
      analyzer:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    profiles: ["live"]

  # -- React Frontend Dashboard -----------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartenergy-frontend
    ports:
      - "5173:5173"
    depends_on:
      api-live:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    profiles: ["live"]
